<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lummar Conectados Fest</title>

<!-- ICONO DE PESTAÑA -->
<link rel="icon" type="image/png" href="assets/images/favicon.png">

<!-- FUENTE PERSONALIZADA -->
<style>
@font-face {
  font-family: 'The Secret Mouse';
  src: url('assets/fonts/TheSecretMouse.ttf') format('truetype');
}

/* RESET Y FUENTES */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

/* BODY */
body{
  scroll-behavior:smooth; /* Scroll suave para navegadores modernos */
  background:#111;
  color:white;
}

/* HERO / PORTADA */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  background: linear-gradient(270deg, #52BAAB, #2F4596, #3D2763, #FFFEF8, #BF78B0);
  background-size:800% 800%;
  animation:fondo 12s ease infinite;
  -webkit-animation:fondo 12s ease infinite; /* Safari y Chrome antiguos */
}

@keyframes fondo{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@-webkit-keyframes fondo{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* TITULO HERO */
.titulo-lummar{
  font-family:'The Secret Mouse', Arial, sans-serif;
  font-size:80px;
  letter-spacing:5px;
}

/* SUBTITULO */
.hero p{
  font-size:25px;
  opacity:0.9;
}

/* SECCIONES GENERALES */
section{
  padding:100px 10%;
  text-align:center;
}

/* LINEUP / ARTISTAS */
.lineup{
  background:#1c1c1c;
}

/* Grid + Fallback flexbox */
.artistas{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:30px;
  margin-top:40px;

  display: -ms-flexbox; /* Fallback IE10+ */
  -ms-flex-wrap: wrap;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#2a2a2a;
  border-radius:15px;
  overflow:hidden;
  text-decoration:none;
  color:white;
  transition:0.4s;
  flex: 1 1 220px; /* fallback IE */
  margin:10px;
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card h3{
  padding:15px;
  font-size:20px;
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* FECHAS */
.fechas{
  background:#151515;
  font-size:28px;
}

/* TICKETS */
.tickets{
  background:#1c1c1c;
}

.boton{
  display:inline-block;
  margin-top:30px;
  padding:15px 40px;
  background:#52BAAB;
  color:black;
  font-weight:bold;
  border-radius:30px;
  text-decoration:none;
  transition:0.3s;
}

.boton:hover{
  transform:scale(1.1);
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  background:#000;
  font-size:14px;
}
</style>
</head>

<body>

<!-- PORTADA HERO -->
<div class="hero">
  <h1 class="titulo-lummar">LUMMAR FEST</h1>
  <p>Conectados</p>
</div>

<!-- SECCION ARTISTAS -->
<section class="lineup">
  <h2>LINEUP</h2>
  <div class="artistas">

    <a href="ela.html" class="card">
      <h3>ELA TAUBERT</h3>
    </a>

    <a href="morat.html" class="card">
      <h3>MORAT</h3>
    </a>

    <a href="timo.html" class="card">
      <h3>TIMØ</h3>
    </a>

    <a href="tini.html" class="card">
      <h3>TINI</h3>
    </a>

    <a href="emilia.html" class="card">
      <h3>EMILIA</h3>
    </a>

  </div>
</section>

<!-- SECCION FECHAS -->
<section class="fechas">
  <h2>FECHA DEL FESTIVAL</h2>
  <p>07 Julio 2026</p>
</section>

<!-- SECCION TICKETS -->
<section class="tickets">
  <h2>ENTRADAS</h2>
  <p>Compra tus boletos para vivir la experiencia</p>
  <a class="boton" href="ticket.html">Tickets</a>
</section>

<!-- FOOTER -->
<footer>
  Lummar Conectados Fest © 2026
</footer>

<!-- SCROLL SUAVE OPCIONAL PARA IE -->
<script>
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e){
    e.preventDefault();
    const target = document.querySelector(this.getAttribute('href'));
    if(target){
      window.scrollTo({ top: target.offsetTop, behavior:'smooth' });
    }
  });
});
</script>

</body>
</html>
